# Cloudflare Tunnel config for the Mac mini.
# After creating the tunnel with `cloudflared tunnel create np-invitational`,
# copy this file to ~/.cloudflared/config.yml and replace TUNNEL_UUID with the
# UUID cloudflared printed. The credentials JSON lives next to it.
#
# Then run:
#   cloudflared tunnel route dns np-invitational np.huffmanai.com
#   cloudflared tunnel run np-invitational
#
# Cloudflare will proxy np.huffmanai.com → http://127.0.0.1:3000 on the mini.

tunnel: TUNNEL_UUID
credentials-file: /Users/YOU/.cloudflared/TUNNEL_UUID.json

ingress:
  - hostname: np.huffmanai.com
    service: http://127.0.0.1:3000
    originRequest:
      # SSE connections stay open — keep these generous.
      noTLSVerify: true
      connectTimeout: 30s
      tcpKeepAlive: 30s
      keepAliveConnections: 20
      keepAliveTimeout: 90s
      # Disable any response buffering that would break SSE.
      disableChunkedEncoding: false
  - service: http_status:404
